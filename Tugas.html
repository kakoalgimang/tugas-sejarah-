<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas sejarah</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="bg-animate"></div>

    <header>
        <div class="glitch-wrapper">
            <h1 class="glitch" data-text="NEO-EXPLORE">wali songo</h1>
        </div>
        <p>sunan kalijaga</p>
    </header>

    <main class="grid-container">
        <div class="neon-card">
            <input type="checkbox" id="c1">
            <label for="c1" class="card-body">
                <div class="img-container">
                    <img src="sunankalijaga.jpg" alt="Cyber">
                    <div class="scanner-line"></div>
                </div>
                <div class="text-content">
                    <span class="tag">wali</span>
                    <h2>sunan kalijaga</h2>
                    <p>1450-1592 M</p>
                </div>
                <div class="data-reveal">
                    <h3>[ Pengetahuan ]</h3>
                    <p>Tahukah kamu? Sunan Kalijaga adalah Raden Said (atau Raden Sahid/Raden Mas Said). Beliau merupakan putra dari Tumenggung Wilatikta, Bupati Tuban, dan lahir sekitar tahun 1450 Masehi. Sebelum menjadi anggota Walisongo, beliau juga dikenal dengan nama lain seperti Lokajaya, Syekh Malaya, atau Pangeran Tuban</p>
                    <div class="status-ok">STATUS:Sunan ke-6</div>
                </div>
            </label>
        </div>

        <div class="neon-card">
            <input type="checkbox" id="c2">
            <label for="c2" class="card-body">
                <div class="img-container">
                    <img src="wayangkulit.jpg" alt="Mars">
                    <div class="scanner-line"></div>
                </div>
                <div class="text-content">
                    <span class="tag">alat</span>
                    <h2>wayang Kulit</h2>
                    <p></p>
                </div>
                <div class="data-reveal">
                    <h3>[ pengetahuan ]</h3>
                    <p>Berasal dari kata "bayangan", wayang kulit merupakan seni tradisional yang berkembang pesat di Jawa dan Bali. Pertunjukan ini menggabungkan seni rupa (tatahan wayang), seni musik (gamelan), seni peran (dalang), dan sastra.</p>
                    <div class="status-ok">STATUS: media penyebaran</div>
                </div>
            </label>
        </div>

        <div class="neon-card">
            <input type="checkbox" id="c3">
            <label for="c3" class="card-body">
                <div class="img-container">
                    <img src="images.jpeg" alt="DNA">
                    <div class="scanner-line"></div>
                </div>
                <div class="text-content">
                    <span class="tag">penyebaran islam</span>
                    <h2>cara penyebaran</h2>
                    <p>melalui wayang kulit</p>
                </div>
                <div class="data-reveal">
                    <h3>[ pengetahuan ]</h3>
                    <p>menggunakan media Wayang Kulit untuk berdakwah, di mana beliau sendiri yang menjadi dalangnya. Beliau menciptakan tokoh-tokoh wayang baru yang melambangkan rukun Islam</p>
                    <div class="status-ok">STATUS: pengetahuan</div>
                </div>
            </label>
        </div>
    </main>

    <footer>
        <div class="scrolling-text">
            maaf atas ketidaksempurnaannya karena yang sempurna hanyalah milik allah swt.
        </div>
    </footer>

</body>
</html>
